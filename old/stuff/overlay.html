<head>

  <title>overlay </title>
</head>

<style>
.outer {
    position:relative;
    width: 100%;
}
.overlayed {
    display: none;
}

.overlayed:hover .overlay {
    display: block;
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0.2;
    top: 0;
}

</style>

<body>
  <div class="outer">
    <img src="img/space1.jpg" style="width:100%;">
    <div class="overlayed">
           <p class="text">x</p>
       </div>

  </div>
</body>
